name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if deploy needed
        id: check
        run: |
          git diff --name-only HEAD^ HEAD | grep -qE '^(todo-api|todo-web|docker-compose)' \
            && echo "needed=true" >> $GITHUB_OUTPUT \
            || echo "needed=false" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: steps.check.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./todo-api/Dockerfile
          push: true
          tags: ghcr.io/nakano8/todos-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./todo-web/Dockerfile
          push: true
          tags: ghcr.io/nakano8/todos-web:latest
          build-args: NEXT_PUBLIC_API_BASE=https://api.hikawata.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        if: steps.check.outputs.needed == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            git pull origin main
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api web
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f

            for i in $(seq 1 10); do
              code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/auth/me || echo "000")
              if [ "$code" = "401" ]; then
                echo "API health check passed (401 from /auth/me)"
                exit 0
              fi
              sleep 3
            done
            echo "API health check failed: /auth/me did not return 401 after 30s"
            exit 1
